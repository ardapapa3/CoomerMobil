name: Build APK

on:
  workflow_dispatch:  # Manuel başlatmaya izin ver

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flet Yükle
        run: pip install flet

      - name: APK'ya Dönüştür
        run: flet build apk

      - name: Dosyayı Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Coomer_Mobile_APK
          path: build/apk/app-release.apk
